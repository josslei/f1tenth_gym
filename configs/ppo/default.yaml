env:
  map_ext: .png
  num_agents: 1
  render_mode:

observation:
  scan_size: 108
  scan_max_m: 30.0
  include_ego_state: true
  speed_scale: 8.0
  yaw_rate_scale: 10.0

action:
  velocity_min: 0.0
  velocity_max: 8.0

reward:
  # Reference PPO reward from F1Tenth-RL (ref/F1Tenth-RL/code/wrappers.py):
  #   reward = ||v||_2  +  (count/N) * waypoint_bonus_weight  -  collision_penalty
  # with spin termination at |poses_theta| > spin_threshold.
  waypoint_proximity: 2.0       # m — distance to trigger waypoint progress bonus
  waypoint_bonus_weight: 0.5    # max bonus fraction per reached waypoint
  collision_penalty: 1.0        # hard penalty on collision (returned as -value)
  spin_threshold: 100.0         # |poses_theta| beyond which episode terminates

policy:
  name: ResidualMLPPolicy
  kwargs:
    scan_size: 108
    state_dim: 6
    width: 192
    head_width: 96
    num_residual_blocks: 1
    activation: relu

training:
  k_epochs: 10
  mini_batch_size: 128
  learning_rate: 0.0003
  epsilon: 0.2
  c1: 0.5
  c2: 0.01
  normalize_advantages: true
  max_grad_norm: 0.5

runtime:
  seed: 42
  ppo_iterations: 300
  rollout_steps: 512
  progress_bar: true
  num_envs: 8

tracks:
  holdout: [Spielberg]   # never trained on
  test_ratio: 0.2        # split remaining tracks into train/test
  curriculum:
    initial: 4            # tracks in pool at start
    increment: 4          # added per milestone
    interval_frac: 0.1    # milestone every 10% of iterations

output:
  dir: outputs/rl/ppo_multitrack
