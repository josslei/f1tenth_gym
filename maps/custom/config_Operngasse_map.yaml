# metadata
run_name: 'operngasse'
perf_num: 6

# Source: CPS-TUWien/f1tenth_maps; centerline extracted via
# scripts/build_track_package.py. Lap 30.9 m,
# min half-width 0.57 m (set controller lane_width <= this).
track_name: Operngasse
mu_id: '10'

# map paths ({track_name} and {mu_id} are expanded by the loader)
map_path: ./{track_name}_{mu_id}/{track_name}_map
map_ext: '.png'

# starting pose - widest-clearance centerline point (idx 171)
sx: 2.1265117
sy: 7.1003186
stheta: -2.8329352

# centerline-based reference trajectory (curvature-capped speed;
# replace with TUM raceline optimizer output for a real raceline)
wpt_path: ./{track_name}_{mu_id}/traj_race_cl_centerline_{track_name}_{mu_id}_map.csv
wpt_delim: ';'
wpt_rowskip: 3
wpt_xind: 1
wpt_yind: 2
wpt_thind: 3
wpt_vind: 5

# centerline for track-boundary detection
centerline_path: ./{track_name}_{mu_id}/{track_name}_centerline.csv
