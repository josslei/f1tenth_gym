# metadata
run_name: 'blackbox2021_3'
perf_num: 6

# Source: CPS-TUWien/f1tenth_maps; centerline extracted via
# scripts/build_track_package.py. Lap 93.1 m,
# min half-width 0.80 m (set controller lane_width <= this).
track_name: blackbox2021_3
mu_id: '10'

# map paths ({track_name} and {mu_id} are expanded by the loader)
