env:
  map: maps/custom/f110_gym_10/f110_gym_map.yaml
  map_ext: .png
  num_agents: 1
  render_mode:
  initial_pose:
    - [1.0748956, -0.1528569, 0.0349893]
  centerline_csv: maps/custom/f110_gym_10/f110_gym_centerline.csv

observation:
  scan_size: 108
  scan_max_m: 30.0
  include_ego_state: true
  speed_scale: 8.0
  yaw_rate_scale: 10.0

action:
  velocity_min: 1.0
  velocity_max: 8.0

reward:
  waypoints_path: maps/custom/f110_gym_10/f110_gym_centerline.csv
  delimiter: ","
  usecols: [0, 1]
  waypoint_proximity: 2.0
  speed_reward_weight: 0.1
  dense_progress_weight: 0.5
  waypoint_bonus_weight: 1.0
  collision_penalty: 2.0
  collision_growth: 0.005
  spin_threshold: 100.0

policy:
  name: GaussianMLPPolicy
  kwargs:
    hidden_size: 256

training:
  k_epochs: 10
  mini_batch_size: 256
  learning_rate: 0.0003
  epsilon: 0.2
  c1: 0.5
  c2: 0.01
  normalize_advantages: true
  max_grad_norm: 0.5

runtime:
  seed: 42
  ppo_iterations: 1000
  rollout_steps: 2048
  progress_bar: true
  num_envs: 4

output:
  dir: outputs/rl/ppo_f110_gym_10

validation:
  map: maps/custom/Operngasse_10/Operngasse_map
  map_ext: .png
  episodes: 2
  centerline_csv: maps/custom/Operngasse_10/Operngasse_centerline.csv
