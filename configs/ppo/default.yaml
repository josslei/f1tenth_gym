env:
  map_ext: .png
  num_agents: 1
  render_mode:

observation:
  scan_size: 108
  scan_max_m: 30.0
  include_ego_state: true
  speed_scale: 8.0
  yaw_rate_scale: 10.0

action:
  velocity_min: 0.0
  velocity_max: 8.0

reward:
  speed_coef: 2.0               # multiplier for forward speed reward
  clearance_threshold: 1.5      # min scan (m) at which clearance_factor = 1.0
  proximity_threshold: 0.5      # scan (m) below which proximity penalty activates
  proximity_coef: 2.0           # multiplier for proximity penalty
  collision_penalty: 1.0        # penalty for collision
  lap_bonus: 1.0                # bonus for clean lap completion

policy:
  name: GaussianActorCritic
  kwargs:
    hidden_size: 128

training:
  k_epochs: 10
  mini_batch_size: 128
  learning_rate: 0.0003
  epsilon: 0.2
  c1: 0.5
  c2: 0.01
  normalize_advantages: true
  max_grad_norm: 0.5

runtime:
  seed: 42
  ppo_iterations: 300
  rollout_steps: 512
  progress_bar: true
  num_envs: 8

tracks:
  holdout: [Spielberg]   # never trained on
  test_ratio: 0.2        # split remaining tracks into train/test
  curriculum:
    initial: 4            # tracks in pool at start
    increment: 4          # added per milestone
    interval_frac: 0.1    # milestone every 10% of iterations

output:
  dir: outputs/rl/ppo_multitrack
